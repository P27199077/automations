<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background Remover</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 30, 54, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #a855f7; /* Purple */
            --accent-success: #10b981; /* Green */
            --accent-danger: #ef4444; /* Red */
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        header {
            padding: 2rem 4rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            padding: 3rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px 0 rgba(99, 102, 241, 0.1);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--accent-primary);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Form styling */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        select, input[type="range"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 1rem;
        }

        input[type="color"] {
            border: none;
            outline: none;
            background: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .range-value {
            font-size: 0.85rem;
            color: var(--accent-primary);
            float: right;
            font-weight: 600;
        }

        /* Queue List */
        .queue-container {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 550px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-right: 0.5rem;
        }

        .queue-container::-webkit-scrollbar {
            width: 6px;
        }

        .queue-container::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 10px;
        }

        .queue-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-weight: 600;
            font-size: 0.95rem;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .status-queued { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }
        .status-processing { background: rgba(99, 102, 241, 0.15); color: var(--accent-primary); }
        .status-completed { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .status-failed { background: rgba(239, 68, 68, 0.15); color: var(--accent-danger); }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .queue-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-download {
            background: var(--accent-success);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-process {
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-process:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">VisualAlpha.ai</div>
        <div style="font-size: 0.85rem; color: var(--text-secondary)">Video background transparency engine</div>
    </header>

    <div class="container">
        <!-- Input & Configuration -->
        <div class="panel">
            <h2>
                <span>📹</span> Upload & Configuration
            </h2>
            <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">☁️</div>
                <p style="font-weight: 600; margin-bottom: 0.5rem;">Drag & drop video files here</p>
                <p style="font-size: 0.85rem; color: var(--text-secondary)">or click to browse from finder (mp4, mov, avi, webm)</p>
                <input type="file" id="file-input" multiple accept="video/*">
            </div>

            <div class="form-group">
                <label for="method-select">Extraction Method</label>
                <select id="method-select">
                    <option value="chroma">Chroma Key (Solid Color Background)</option>
                    <option value="ai">AI Subject Segmentation (Complex Background)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="format-select">Output Format</label>
                <select id="format-select">
                    <option value="webm">WebM (Optimized for Web, VP9 Codec)</option>
                    <option value="mov">MOV (Animation/ARGB Lossless for Video Editors)</option>
                    <option value="png">PNG Sequence (Extract frames to a ZIP folder)</option>
                </select>
            </div>

            <div id="chroma-options">
                <div class="controls-row">
                    <div class="form-group">
                        <label>Key Color</label>
                        <div class="color-picker-container">
                            <input type="color" id="chroma-color" value="#00ff00">
                            <span id="color-hex">#00ff00</span>
                        </div>
                    </div>
                </div>
                <div class="controls-row" style="margin-top: 1.5rem">
                    <div class="form-group">
                        <label>Tolerance <span class="range-value" id="tolerance-val">60</span></label>
                        <input type="range" id="tolerance-slider" min="10" max="150" value="60">
                    </div>
                    <div class="form-group">
                        <label>Softness <span class="range-value" id="softness-val">10</span></label>
                        <input type="range" id="softness-slider" min="1" max="50" value="10">
                    </div>
                </div>
            </div>

            <div id="ai-options" style="display: none;">
                <div class="form-group" style="margin-top: 1rem;">
                    <label for="ai-model-select">AI Segmentation Model</label>
                    <select id="ai-model-select">
                        <option value="isnet-general-use">Highly Sharp/Precise (ISNet-general - Recommended)</option>
                        <option value="u2net">General Purpose (U2Net)</option>
                        <option value="u2net_human_seg">Human Portrait Optimized</option>
                    </select>
                </div>
                <div class="form-group" style="flex-direction: row; align-items: center; gap: 0.75rem; margin-top: 1.5rem;">
                    <input type="checkbox" id="alpha-matting-check" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-primary);">
                    <label for="alpha-matting-check" style="cursor: pointer; margin-bottom: 0; user-select: none;">Enable Alpha Matting (Incredibly clean edges for complex details/hair)</label>
                </div>
            </div>
        </div>

        <!-- Processing Queue -->
        <div class="panel">
            <h2>
                <span>⚡</span> Active Processing Queue
            </h2>
            <div class="queue-container" id="queue-container">
                <div class="empty-state" id="empty-state">
                    No videos in the processing queue. Upload a video to start.
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const methodSelect = document.getElementById('method-select');
        const chromaOptions = document.getElementById('chroma-options');
        const aiOptions = document.getElementById('ai-options');
        const chromaColor = document.getElementById('chroma-color');
        const colorHex = document.getElementById('color-hex');
        const toleranceSlider = document.getElementById('tolerance-slider');
        const toleranceVal = document.getElementById('tolerance-val');
        const softnessSlider = document.getElementById('softness-slider');
        const softnessVal = document.getElementById('softness-val');
        const formatSelect = document.getElementById('format-select');
        const aiModelSelect = document.getElementById('ai-model-select');
        const alphaMattingCheck = document.getElementById('alpha-matting-check');
        const queueContainer = document.getElementById('queue-container');
        const emptyState = document.getElementById('empty-state');

        // Toggle options based on method selection
        methodSelect.addEventListener('change', () => {
            if (methodSelect.value === 'ai') {
                chromaOptions.style.display = 'none';
                aiOptions.style.display = 'block';
            } else {
                chromaOptions.style.display = 'block';
                aiOptions.style.display = 'none';
            }
        });

        // Update slider values
        toleranceSlider.addEventListener('input', () => toleranceVal.textContent = toleranceSlider.value);
        softnessSlider.addEventListener('input', () => softnessVal.textContent = softnessSlider.value);
        chromaColor.addEventListener('input', () => colorHex.textContent = chromaColor.value.toUpperCase());

        // Drag and drop event handlers
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', e => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });

        function handleFiles(files) {
            for (let i = 0; i < files.length; i++) {
                uploadFile(files[i]);
            }
        }

        // Upload and configure task
        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            emptyState.style.display = 'none';

            // Create placeholder task item in UI
            const taskCardId = 'task-card-' + Date.now() + Math.random().toString(36).substr(2, 9);
            const card = document.createElement('div');
            card.className = 'queue-item';
            card.id = taskCardId;
            card.innerHTML = `
                <div class="queue-header">
                    <div class="file-name">${file.name}</div>
                    <span class="status-badge status-queued" id="${taskCardId}-status">Uploading...</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="${taskCardId}-progress" style="width: 0%"></div>
                </div>
                <div class="queue-footer">
                    <span id="${taskCardId}-info">Queueing file...</span>
                </div>
            `;
            queueContainer.appendChild(card);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(task => {
                if (task.error) {
                    showError(taskCardId, task.error);
                    return;
                }
                // Trigger background removal processing using selected configuration
                triggerProcess(taskCardId, task.id);
            })
            .catch(err => {
                showError(taskCardId, "Upload failed.");
            });
        }

        function triggerProcess(taskCardId, taskId) {
            const config = {
                method: methodSelect.value,
                format: formatSelect.value,
                color: chromaColor.value,
                tolerance: toleranceSlider.value,
                softness: softnessSlider.value,
                model: aiModelSelect.value,
                alpha_matting: alphaMattingCheck.checked
            };

            const statusBadge = document.getElementById(`${taskCardId}-status`);
            statusBadge.className = 'status-badge status-queued';
            statusBadge.textContent = 'Queued';
            document.getElementById(`${taskCardId}-info`).textContent = 'Waiting to process...';

            fetch(`/process/${taskId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            })
            .then(res => res.json())
            .then(task => {
                if (task.error) {
                    showError(taskCardId, task.error);
                    return;
                }
                // Start polling status
                pollStatus(taskCardId, taskId);
            })
            .catch(err => {
                showError(taskCardId, "Failed to start processing.");
            });
        }

        function pollStatus(taskCardId, taskId) {
            const interval = setInterval(() => {
                fetch(`/status/${taskId}`)
                .then(res => res.json())
                .then(task => {
                    const statusBadge = document.getElementById(`${taskCardId}-status`);
                    const progressFill = document.getElementById(`${taskCardId}-progress`);
                    const infoText = document.getElementById(`${taskCardId}-info`);

                    if (task.status === 'processing') {
                        statusBadge.className = 'status-badge status-processing';
                        statusBadge.textContent = 'Processing';
                        progressFill.style.width = task.progress + '%';
                        infoText.textContent = `Processing frames... ${task.progress}%`;
                    } else if (task.status === 'completed') {
                        statusBadge.className = 'status-badge status-completed';
                        statusBadge.textContent = 'Completed';
                        progressFill.style.width = '100%';
                        progressFill.style.background = 'var(--accent-success)';
                        infoText.textContent = 'Transparent render ready!';
                        
                        // Add download button
                        const footer = document.querySelector(`#${taskCardId} .queue-footer`);
                        footer.innerHTML = `
                            <span>✓ Completed</span>
                            <a href="/download/${taskId}" class="btn-download" download>Download Video</a>
                        `;
                        clearInterval(interval);
                    } else if (task.status === 'failed') {
                        statusBadge.className = 'status-badge status-failed';
                        statusBadge.textContent = 'Failed';
                        infoText.textContent = `Error: ${task.error || 'Unknown error'}`;
                        clearInterval(interval);
                    }
                })
                .catch(err => {
                    clearInterval(interval);
                });
            }, 1000);
        }

        function showError(taskCardId, message) {
            const statusBadge = document.getElementById(`${taskCardId}-status`);
            statusBadge.className = 'status-badge status-failed';
            statusBadge.textContent = 'Failed';
            document.getElementById(`${taskCardId}-info`).textContent = message;
        }
    </script>
</body>
</html>
